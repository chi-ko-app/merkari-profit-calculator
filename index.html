<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メル益♡</title>
    <meta name="apple-mobile-web-app-title" content="メル益♡">
    <meta name="application-name" content="メル益♡">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- ステータスバー風ヘッダー -->
        <header class="app-header">
            <div class="header-content">
                <button class="dark-mode-btn" id="darkModeBtn">🌙</button>
                <h1 class="app-title">メル益♡</h1>
                <button class="settings-btn" id="settingsBtn">⚙️</button>
            </div>
        </header>

        <!-- メインコンテンツ -->
        <main class="app-main" id="mainContent">
            <!-- 利益カード -->
            <div class="profit-widget">
                <div class="profit-widget-content">
                    <p class="profit-label">あなたの利益</p>
                    <div class="profit-display">
                        <p class="profit-number" id="profitWidget">¥0</p>
                        <p class="profit-rate-widget" id="profitRateWidget">0%</p>
                    </div>
                </div>
                <div class="profit-widget-details">
                    <div class="detail-item">
                        <span class="detail-label">手数料</span>
                        <span class="detail-value" id="mercariFeeCopy">¥0</span>
                    </div>
                    <div class="detail-separator"></div>
                    <div class="detail-item">
                        <span class="detail-label">送料</span>
                        <span class="detail-value" id="shippingFeeCopy">¥0</span>
                    </div>
                </div>
            </div>

            <!-- 売値入力 -->
            <section class="input-section">
                <label class="input-label">売値</label>
                <div class="input-wrapper">
                    <input type="number" id="sellingPrice" class="app-input" placeholder="金額を入力" min="0" step="100">
                    <span class="input-suffix">¥</span>
                </div>
            </section>

            <!-- 配送方法 -->
            <section class="shipping-section">
                <label class="section-title">配送方法を選択</label>
                <div class="shipping-grid">
                    <label class="shipping-card">
                        <input type="radio" name="shipping" value="210" data-label="ゆうパケットポスト" class="shipping-radio">
                        <div class="card-content">
                            <div class="card-icon">📫</div>
                            <div class="card-text">
                                <span class="card-name">ゆうパケット</span>
                                <span class="card-price">¥210</span>
                            </div>
                        </div>
                    </label>

                    <label class="shipping-card">
                        <input type="radio" name="shipping" value="210" data-label="ネコポス" class="shipping-radio">
                        <div class="card-content">
                            <div class="card-icon">🐱</div>
                            <div class="card-text">
                                <span class="card-name">ネコポス</span>
                                <span class="card-price">¥210</span>
                            </div>
                        </div>
                    </label>

                    <label class="shipping-card">
                        <input type="radio" name="shipping" value="450" data-label="宅急便コンパクト" class="shipping-radio">
                        <div class="card-content">
                            <div class="card-icon">📦</div>
                            <div class="card-text">
                                <span class="card-name">宅急便</span>
                                <span class="card-price">¥450</span>
                            </div>
                        </div>
                    </label>

                    <label class="shipping-card">
                        <input type="radio" name="shipping" value="520" data-label="ゆうパケットプラス" class="shipping-radio">
                        <div class="card-content">
                            <div class="card-icon">📮</div>
                            <div class="card-text">
                                <span class="card-name">ゆうパケット+</span>
                                <span class="card-price">¥520</span>
                            </div>
                        </div>
                    </label>
                </div>

                <!-- カスタム送料 -->
                <label class="shipping-card custom-shipping" id="customShippingCard">
                    <input type="radio" name="shipping" value="custom" data-label="カスタム" class="shipping-radio">
                    <div class="card-content custom-content">
                        <div class="custom-input-wrapper">
                            <span class="input-prefix">¥</span>
                            <input type="number" id="customShipping" class="custom-input" placeholder="金額" min="0" step="10">
                        </div>
                        <span class="custom-label">カスタム</span>
                    </div>
                </label>
            </section>

            <!-- 保存ボタン -->
            <button class="save-btn" id="saveBtn">💾 この結果を保存</button>

            <!-- エラーメッセージ -->
            <div class="error-banner" id="errorMessage" style="display: none;"></div>
        </main>

        <!-- 設定画面 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-content">
                <!-- クローズボタン -->
                <button class="close-btn" id="closeSettingsBtn">✕</button>

                <h2 class="settings-title">⚙️ 設定</h2>

                <!-- テーマセレクター -->
                <div class="settings-section">
                    <h3 class="settings-subtitle">🎨 テーマカラー</h3>
                    <div class="theme-grid">
                        <button class="theme-btn" data-theme="pink" style="background: linear-gradient(135deg, #FFB6D9, #FFC0CB);" title="ピンク"></button>
                        <button class="theme-btn" data-theme="blue" style="background: linear-gradient(135deg, #B0E0E6, #ADD8E6);" title="水色"></button>
                        <button class="theme-btn" data-theme="mint" style="background: linear-gradient(135deg, #98FF98, #A8E6A8);" title="ミントグリーン"></button>
                        <button class="theme-btn" data-theme="lavender" style="background: linear-gradient(135deg, #E6D5FF, #D8AFFF);" title="ラベンダー"></button>
                        <button class="theme-btn" data-theme="white" style="background: linear-gradient(135deg, #FFFFFF, #F5F5F5);" title="ホワイト"></button>
                        <button class="theme-btn" data-theme="yellow" style="background: linear-gradient(135deg, #FFFFE0, #FFFACD);" title="薄いイエロー"></button>
                        <button class="theme-btn" data-theme="dark" style="background: linear-gradient(135deg, #2C2C2C, #1A1A1A);" title="ダーク"></button>
                    </div>
                </div>

                <!-- フォントセレクター -->
                <div class="settings-section">
                    <h3 class="settings-subtitle">📝 フォント</h3>
                    <div class="font-options">
                        <button class="font-btn" data-font="noto">游ゴシック</button>
                        <button class="font-btn" data-font="serif">セリフ</button>
                        <button class="font-btn" data-font="rounded">丸ゴシック</button>
                        <button class="font-btn" data-font="cute">キュート</button>
                        <button class="font-btn" data-font="romantic">ロマンティック</button>
                        <button class="font-btn" data-font="funky">ファンキー</button>
                    </div>
                </div>

                <!-- フォントカラー -->
                <div class="settings-section">
                    <h3 class="settings-subtitle">🎨 フォントカラー</h3>
                    <div class="font-color-grid">
                        <button class="font-color-btn" data-color="black" style="background: #000000;" title="黒"></button>
                        <button class="font-color-btn" data-color="white" style="background: #FFFFFF; border: 2px solid #ccc;" title="白"></button>
                    </div>
                </div>

                <!-- 履歴 -->
                <div class="settings-section">
                    <h3 class="settings-subtitle">📊 計算履歴</h3>
                    <div class="history-container" id="historyContainer">
                        <p class="empty-message">履歴はまだありません</p>
                    </div>
                </div>

                <!-- グラフ -->
                <div class="settings-section">
                    <h3 class="settings-subtitle">📈 利益推移</h3>
                    <div class="chart-tabs">
                        <button class="chart-tab active" data-chart="daily">日別</button>
                        <button class="chart-tab" data-chart="monthly">月別</button>
                    </div>
                    <div class="chart-container">
                        <canvas id="profitChart"></canvas>
                    </div>
                </div>

                <!-- クリアボタン -->
                <button class="clear-btn" id="clearHistoryBtn">🗑️ 履歴をクリア</button>
            </div>
        </div>

        <!-- オーバーレイ -->
        <div class="settings-overlay" id="settingsOverlay"></div>

        <!-- パディング -->
        <div class="safe-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
